# ============================================================
# RoboVision Controller — CI/CD Pipeline with SAST
# Module 10: Static Application Security Testing
#
# Changes from Module 6:
#   + include: Jobs/SAST.gitlab-ci.yml  (one line enables all SAST)
#   + SAST configuration variables
#   + sast stage explicitly defined for ordering visibility
#
# SAST pipeline flow:
#   validate → test → sast → build → deploy-dev → deploy-qa → deploy-prod
#
# GitLab SAST docs: https://docs.gitlab.com/ee/user/application_security/sast/
# SAST analyzers:   https://docs.gitlab.com/ee/user/application_security/sast/analyzers.html
# SAST variables:   https://docs.gitlab.com/ee/user/application_security/sast/#available-cicd-variables
# ============================================================

# ─── SECURITY SCAN TEMPLATES ─────────────────────────────────
# GitLab managed templates inject security scan jobs automatically.
# Language detection is automatic — no per-language configuration needed.
include:
  - template: Jobs/SAST.gitlab-ci.yml        # Semgrep + language-specific analyzers
  # The following templates will be added in later modules:
  # - template: Jobs/Secret-Detection.gitlab-ci.yml   (Module 11)
  # - template: Jobs/Dependency-Scanning.gitlab-ci.yml (Module 11)
  # - template: Jobs/Container-Scanning.gitlab-ci.yml  (Module 12)
  # - template: Jobs/IaC-Scanning.gitlab-ci.yml        (Module 12)

# ─── GLOBAL DEFAULTS ─────────────────────────────────────────
default:
  image: python:3.11-slim
  before_script:
    - pip install --quiet -r requirements.txt
  retry:
    max: 1
    when:
      - runner_system_failure

# ─── PIPELINE STAGES ─────────────────────────────────────────
# Note: 'sast' stage is defined by the SAST template.
# We include it here for explicit ordering clarity.
stages:
  - validate
  - test
  - sast        # ← Added: SAST template injects jobs into this stage
  - build
  - deploy-dev
  - deploy-qa
  - deploy-prod

# ─── SAST CONFIGURATION VARIABLES ────────────────────────────
# These variables customise SAST behaviour.
# Full list: https://docs.gitlab.com/ee/user/application_security/sast/#available-cicd-variables
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "."

  # ── SAST Tuning ──────────────────────────────────────────
  # Exclude directories that should not be scanned
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, node_modules, vendor"

  # Semgrep-specific: which rulesets to apply
  # p/default = GitLab curated default rules
  # p/python   = Python-specific security rules
  # p/security-audit = broader audit ruleset (more findings, more false positives)
  SEMGREP_RULES: "p/default"

  # Set to 'true' to fail the pipeline on any SAST finding
  # Recommended: start with false (warn only), enable after baseline cleanup
  # SAST_FAIL_ON_SEVERITY: "critical"   # Uncomment to block on critical findings

  # Image pull policy — set to 'never' if Runners are in air-gapped network
  # and you have pre-loaded the analyzer image
  # SAST_ANALYZER_IMAGE_PULL_POLICY: "if-not-present"

# ─── STAGE: validate ─────────────────────────────────────────
lint:
  stage: validate
  script:
    - flake8 app/ tests/ --max-line-length=120 --statistics
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.cache/pip]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'

# ─── STAGE: test ─────────────────────────────────────────────
unit-tests:
  stage: test
  script:
    - |
      pytest tests/ \
        --cov=app \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --junitxml=test-results.xml \
        -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths: [test-results.xml, coverage.xml]
    expire_in: 30 days
    when: always
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.cache/pip]

# ─── STAGE: sast ─────────────────────────────────────────────
# The SAST template injects the following jobs automatically:
#
#   semgrep-sast:
#     stage: sast
#     image: registry.gitlab.com/security-products/semgrep:latest
#     script:
#       - /analyzer run
#     artifacts:
#       reports:
#         sast: gl-sast-report.json   ← GitLab parses this for the dashboard
#
# You can OVERRIDE the auto-injected job by redefining it here:
# (Only needed for advanced customisation)
#
# semgrep-sast:
#   stage: sast
#   variables:
#     SEMGREP_RULES: "p/default .semgrep/"   # Include custom rules
#   allow_failure: false                       # Block pipeline on findings
#   rules:
#     - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
#     - if: '$CI_COMMIT_BRANCH == "main"'

# ─── STAGE: build ────────────────────────────────────────────
build-image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
    - echo "✅ Image pushed: $IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - docker

# ─── STAGE: deploy-dev ───────────────────────────────────────
deploy-dev:
  stage: deploy-dev
  image: alpine:latest
  before_script: []
  script:
    - echo "Deploying to dev: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - echo "Environment: $APP_ENV"
  environment:
    name: dev
    url: https://dev.robovision.lab
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─── STAGE: deploy-qa ────────────────────────────────────────
deploy-qa:
  stage: deploy-qa
  image: alpine:latest
  before_script: []
  script:
    - echo "Deploying to QA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - echo "Running smoke tests..."
    - sleep 2
    - echo "✅ QA smoke tests passed"
  environment:
    name: qa
    url: https://qa.robovision.lab
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─── STAGE: deploy-prod ──────────────────────────────────────
deploy-production:
  stage: deploy-prod
  image: alpine:latest
  before_script: []
  when: manual
  script:
    - echo "PRODUCTION DEPLOYMENT — approved by $GITLAB_USER_NAME"
    - echo "Image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  environment:
    name: production
    url: https://api.robovision.io
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─── WHAT THE SAST TEMPLATE ADDS (Reference) ─────────────────
#
# When you include Jobs/SAST.gitlab-ci.yml, GitLab injects these
# analyzer jobs based on detected languages:
#
#   Python:       semgrep-sast
#   JavaScript:   semgrep-sast (also eslint if configured)
#   Java:         semgrep-sast (also spotbugs)
#   Go:           semgrep-sast (also gosec)
#   C/C++:        semgrep-sast (also flawfinder)
#   Ruby:         semgrep-sast
#   PHP:          semgrep-sast
#
# Each job produces: gl-sast-report.json
# GitLab parses it via: artifacts: reports: sast:
# Findings appear in: MR Security Widget + Security Dashboard
#
# The report schema is defined at:
# https://gitlab.com/gitlab-org/security-products/security-report-schemas
